name: "CodeQL & Lint"

on:
  workflow_dispatch:
  push:
    branches:
      - '*'
    tags:
      - 'v*'
    paths:
      - '**.py'
      - '**.js'
      - '**.jsx'
      - 'frontend/**'
      - 'backend/**'
      - 'main.py'
      - 'requirements.txt'
      - 'frontend/package-lock.json'
      - 'deploy/docker/Dockerfile'
      - '.dockerignore'
      - 'scripts/start.sh'
      - '.release-please-manifest.json'
      - '.github/workflows/codeql-lint.yml'
  pull_request:
    branches:
      - '*'
    paths:
      - '**.py'
      - '**.js'
      - '**.jsx'
      - 'frontend/**'
      - 'backend/**'
      - 'main.py'
      - 'requirements.txt'
      - 'frontend/package-lock.json'
      - 'deploy/docker/Dockerfile'
      - '.dockerignore'
      - 'scripts/start.sh'
      - '.release-please-manifest.json'
      - '.github/workflows/codeql-lint.yml'
  schedule:
    - cron: '25 4 * * 1'  # Weekly on Monday at 04:25 UTC

permissions:
  security-events: write
  contents: read
  packages: write

jobs:
  # ---- CodeQL Analysis ----
  codeql-python:
    name: CodeQL - Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          languages: python
          queries: +security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          category: '/language:python'

  codeql-javascript:
    name: CodeQL - JavaScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          languages: javascript-typescript
          queries: +security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          category: '/language:javascript-typescript'

  # ---- Backend Lint ----
  backend-lint:
    name: Backend Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linting tools
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check .

  # ---- Backend Smoke Test & Tests ----
  backend-smoke:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify FastAPI app imports cleanly
        run: |
          mkdir -p templates/assets templates/icons templates/img templates/posters
          python -c "from backend.api.main import app; print('OK: ' + str(len(app.routes)) + ' routes loaded')"

      - name: Run tests
        run: python -m pytest tests/ -v

  # ---- Frontend Lint (reusable) ----
  frontend-lint:
    name: Frontend Lint
    uses: chodeus/chodeus-ops/.github/workflows/node-ci.yml@bac8ae59708d42e8c3cd277fe1740164d0ec3ce0 # main
    with:
      node_version: '20'
      package_json_dir: frontend
      run_lint: true
      run_stylelint: true
      run_prettier_check: true

  # ---- Docker Build (gated by all quality checks) ----
  docker-validate:
    name: Docker Validate (PR)
    if: github.event_name == 'pull_request'
    needs: [codeql-python, codeql-javascript, backend-lint, backend-smoke, frontend-lint]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Get branch name
        id: get_branch
        run: echo "BRANCH_NAME=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT

      - name: Set build number
        run: echo "BUILD_NUMBER=$(git rev-list --count HEAD)" >> $GITHUB_ENV

      - name: Build Docker image (validation only)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          platforms: linux/amd64
          build-args: |
            BRANCH=${{ steps.get_branch.outputs.BRANCH_NAME }}
            BUILD_NUMBER=${{ env.BUILD_NUMBER }}
          push: false
          tags: chub:ci-${{ github.sha }}

  docker-push:
    name: Docker Build & Push
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [codeql-python, codeql-javascript, backend-lint, backend-smoke, frontend-lint]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Get the current branch name
        id: get_branch
        run: echo "BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Set build number
        run: echo "BUILD_NUMBER=$(git rev-list --count HEAD)" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/chub
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            BRANCH=${{ steps.get_branch.outputs.BRANCH_NAME }}
            BUILD_NUMBER=${{ env.BUILD_NUMBER }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  notify-failure:
    needs: [codeql-python, codeql-javascript, backend-lint, backend-smoke, frontend-lint, docker-push]
    if: failure() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: chodeus/chodeus-ops/.github/workflows/notify-discord.yml@bac8ae59708d42e8c3cd277fe1740164d0ec3ce0 # main
    with:
      event_type: build
      status: failure
      title: "❌ Pipeline failed: ${{ github.ref_name }}"
      commit_sha: ${{ github.sha }}
    secrets: inherit
