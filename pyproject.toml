[tool.isort]
profile = "black"
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
combine_as_imports = true
line_length = 88

# For Black, set target-version to the lowest Python version you support, e.g., "py39", "py310", "py311"
[tool.black]
line-length = 88
target-version = ["py39"]
skip-string-normalization = false
skip-magic-trailing-comma = false

[tool.ruff]
line-length = 88
target-version = "py39"

[tool.ruff.lint]
extend-select = []
ignore = ["E203"]

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q"
testpaths = [
    "tests",
]